name: "DevSecOps CodeQL Pipeline"

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  analyze:
    name: CodeQL + Security Gates
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: Enforce CodeQL Security Gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking CodeQL alerts..."

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_FILTER="&pr=${{ github.event.pull_request.number }}"
          else
            PR_FILTER=""
          fi

          response=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/code-scanning/alerts?state=open$PR_FILTER")

          count=$(echo "$response" | jq '[.[]? | select(.rule.severity == "high" or .rule.severity == "critical")] | length')

          echo "High/Critical vulnerabilities: $count"

          if [ "$count" -gt 0 ]; then
            echo "Failing due to security policy violation"
            exit 1
          fi

      - name: Build Docker Image
        run: docker build -t devsecops-app .

      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: devsecops-app
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
