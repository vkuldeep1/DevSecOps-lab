name: "DevSecOps CodeQL Pipeline"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  analyze:
    name: CodeQL Analysis + Security Gate
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: read   # REQUIRED for API access

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # Initialize CodeQL
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      # Autobuild
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      # Run Analysis
      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      # Security Gate (REAL ENFORCEMENT)
      - name: Fail on CodeQL alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking CodeQL alerts..."

          response=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/code-scanning/alerts?state=open")

          echo "Raw response:"
          echo "$response"

          count=$(echo "$response" | jq '[.[]? | select(.rule.severity == "error" or .rule.severity == "warning")] | length')

          echo "Open vulnerabilities (High/Critical): $count"

          if [ "$count" -gt 0 ]; then
            echo "Failing due to security policy violation"
            exit 1
          fi
