name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript"

      # FAIL PIPELINE IF CRITICAL/HIGH ISSUES EXIST
      - name: Fail on CodeQL alters
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking CodeQL alerts..."

          response=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repositary }}/code-scanning/alerts?state=open)

          echo "Raw response:"
          echo "$resources"

          count=$(echo "$response" | jq '[.[] | select(.rule.severity == "error" or .rule.serverity == "warning")] | length')

          echo "Open vulnerabilities: $count"

          if [ "$count" -gt 0 ]; then
            echo "Failing due to vulnerabilities"
            exit 1
          fi
